<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#6366f1" />
  <meta name="description" content="PWA 演示：安装到桌面、离线访问" />
  <title>PWA Demo - 可安装 Web 应用</title>
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" type="image/svg+xml" href="./icon-192.svg" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "SF Pro Text", system-ui, -apple-system, sans-serif;
      background: linear-gradient(160deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
      color: #e2e8f0;
      padding: 1.5rem;
    }
    .card {
      max-width: 420px;
      margin: 2rem auto;
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(99, 102, 241, 0.35);
      border-radius: 16px;
      padding: 1.75rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    h1 {
      margin: 0 0 0.5rem;
      font-size: 1.5rem;
      background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .badge {
      display: inline-block;
      padding: 0.25rem 0.6rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-bottom: 1rem;
    }
    .badge.online { background: rgba(34, 197, 94, 0.25); color: #86efac; }
    .badge.offline { background: rgba(239, 68, 68, 0.25); color: #fca5a5; }
    ul { padding-left: 1.25rem; color: #94a3b8; line-height: 1.7; }
    button {
      width: 100%;
      margin-top: 1rem;
      padding: 0.85rem 1rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
      display: none;
    }
    button:hover { filter: brightness(1.08); }
    button.visible { display: block; }
    .hint {
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #64748b;
    }
    code {
      background: rgba(99, 102, 241, 0.15);
      padding: 0.15rem 0.4rem;
      border-radius: 6px;
      font-size: 0.85em;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PWA Demo</h1>
    <span id="status" class="badge online">在线</span>
    <p style="color:#cbd5e1; margin:0 0 1rem;">本页演示了 PWA 核心能力：</p>
    <ul>
      <li><strong>Manifest</strong> — 名称、图标、standalone 显示</li>
      <li><strong>Service Worker</strong> — 预缓存 + 离线 fallback</li>
      <li><strong>可安装</strong> — 支持时显示「安装应用」</li>
    </ul>
    <button id="installBtn" type="button">安装到桌面 / 主屏幕</button>
    <p class="hint">
      本地运行请用 <code>npx serve pwa</code> 或 <code>python -m http.server</code> 在 <code>pwa</code> 目录启动，
      并用 <strong>localhost</strong> 打开（Service Worker 要求安全上下文）。
    </p>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const installBtn = document.getElementById('installBtn');
    let deferredPrompt = null;

    function setOnline(online) {
      statusEl.textContent = online ? '在线' : '离线';
      statusEl.className = 'badge ' + (online ? 'online' : 'offline');
    }
    window.addEventListener('online', () => setOnline(true));
    window.addEventListener('offline', () => setOnline(false));
    setOnline(navigator.onLine);

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      installBtn.classList.add('visible');
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      if (outcome === 'accepted') installBtn.classList.remove('visible');
      deferredPrompt = null;
    });

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('./sw.js', { scope: './' })
        .then((reg) => console.log('SW registered:', reg.scope))
        .catch((err) => console.warn('SW register failed:', err));
    }
  </script>
</body>
</html>
